
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read

name: test-and-ci
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.3
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1
      - name: Run test
        run: go test ./...
        